<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Infinito ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    color: #ff4d6d;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Georgia, serif;
    overflow: hidden;
    transition: background 2s ease;
}

#texto {
    font-size: 38px;
    text-align: center;
    max-width: 80%;
    transition: all 0.8s ease;
}

.fade {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    top: 0;
    left: 0;
    opacity: 0;
    transition: opacity 2s ease;
}
</style>
</head>

<body>

<div id="texto"></div>
<div class="fade" id="fade"></div>

<script>
const texto = document.getElementById("texto");
const fade = document.getElementById("fade");

let pagina = 1;
let totalPaginas = 101;

function mostrarPagina() {

    if (pagina >= 1 && pagina <= 5) {
        texto.innerHTML = "cada momento, cada dia contigo é único, sabia? ❤️";
    }

    else if (pagina >= 15 && pagina <= 18) {
        texto.innerHTML = "saiba que estou sempre contigo, independente do momento sejam eles de queda ou os felizes. ❤️";
    }

    else if (pagina >= 20 && pagina <= 23) {
        texto.innerHTML = "espero que goste desse pequeno mimo, posso não te dar o mundo, mas faria de tudo pra te ver feliz ❤️";
    }

    else if (pagina === 95) {
        texto.innerHTML = "espero que tenha gostado desse mimo, eu te amo meu neném ❤️";
        texto.style.fontSize = "48px";
    }

    else if (pagina === 101) {
        document.body.style.background = "#8B0000";
        texto.innerHTML = "Eu te escolhi e te escolheria outras vezes, faria tudo de novo pra te ter de novo. Eu te amo meu amor ❤️";
        texto.style.fontSize = "55px";

        setTimeout(() => {
            fade.style.opacity = "1";
        }, 5000);

        return; 
    }

    else {
        texto.innerHTML = "Eu te amo ❤️";
        texto.style.fontSize = "38px";
    }

    pagina++;

    if (pagina <= totalPaginas) {
        setTimeout(mostrarPagina, 250);
    }
}

mostrarPagina();
</script>

</body>
</html>
