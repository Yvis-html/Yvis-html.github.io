<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eu te amo vida ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
    font-family: Georgia, serif;
    overflow: hidden;
}

#frase {
    font-size: 90px;
    color: #ff4d6d;
    text-align: center;
    opacity: 0;
    transform: translateY(30px);
    transition: all 1.5s ease;
}

.fade {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    top: 0;
    left: 0;
    opacity: 0;
    transition: opacity 1.5s ease;
}
</style>
</head>

<body>

<h1 id="frase">EU TE AMO VIDA ❤️</h1>
<div class="fade" id="fade"></div>

<script>
window.onload = function() {

    const frase = document.getElementById("frase");
    const fade = document.getElementById("fade");

    // Aparece suavemente
    setTimeout(() => {
        frase.style.opacity = "1";
        frase.style.transform = "translateY(0)";
    }, 500);

    // Fica alguns segundos na tela
    setTimeout(() => {
        fade.style.opacity = "1";

        setTimeout(() => {
            window.location.href = "infinito.html";
        }, 1500);

    }, 4000);
};
</script>

</body>
</html>
